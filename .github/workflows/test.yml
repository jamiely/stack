name: Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  unit-and-integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        if: ${{ hashFiles('package.json') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        if: ${{ hashFiles('package-lock.json') != '' }}
        run: npm ci

      - name: Verify test scripts exist
        if: ${{ hashFiles('package.json') != '' }}
        run: |
          node -e "const fs=require('fs'); const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); const scripts=pkg.scripts||{}; const required=['test','test:unit','coverage']; const missing=required.filter(name=>!scripts[name]); if (missing.length) { console.error('Missing required scripts: ' + missing.join(', ')); process.exit(1); }"

      - name: Run unit tests
        if: ${{ hashFiles('package-lock.json') != '' }}
        run: npm run test:unit

      - name: Run integration tests
        if: ${{ hashFiles('package-lock.json') != '' }}
        run: npm test

      - name: Enforce coverage threshold
        if: ${{ hashFiles('package-lock.json') != '' }}
        run: npm run coverage

      - name: No app scaffold yet
        if: ${{ hashFiles('package.json') == '' }}
        run: echo "Skipping test job because package.json has not been added yet."

  e2e-playwright:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        if: ${{ hashFiles('package.json') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        if: ${{ hashFiles('package-lock.json') != '' }}
        run: npm ci

      - name: Verify Playwright script exists
        if: ${{ hashFiles('package.json') != '' }}
        run: |
          node -e "const fs=require('fs'); const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); const scripts=pkg.scripts||{}; if (!scripts['test:e2e']) { console.error('Missing required script: test:e2e'); process.exit(1); }"

      - name: Install Playwright browsers
        if: ${{ hashFiles('package-lock.json') != '' }}
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        if: ${{ hashFiles('package-lock.json') != '' }}
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ always() && hashFiles('playwright-report/**') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report

      - name: No app scaffold yet
        if: ${{ hashFiles('package.json') == '' }}
        run: echo "Skipping Playwright job because package.json has not been added yet."
